# ============================================================
# Prefix
# ============================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ============================================================
# General
# ============================================================
set -g mouse on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -sg escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1

# ============================================================
# Pane / Window
# ============================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ============================================================
# Status Bar
# ============================================================
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# --- Left: session name ---
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] "

# --- Right: worktree + branch ---
set -g status-right-length 120
set -g status-right "\
#[fg=#a6adc8]#{pane_current_path} \
#[default]| \
#[fg=#f9e2af,bold]\
#(cd #{pane_current_path} && git rev-parse --git-common-dir 2>/dev/null | grep -q '.git/worktrees' && basename $(cd #{pane_current_path} && git rev-parse --show-toplevel) || echo '-')\
#[default] \
#[fg=#a6e3a1,bold]\
 #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo 'no-git')\
#[default] \
#[bg=#585b70,fg=#cdd6f4] %H:%M "

# --- Window tabs ---
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#585b70,fg=#cdd6f4,bold] #I:#W "
